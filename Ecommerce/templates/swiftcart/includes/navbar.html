{% load static %}

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="{% url 'home' %}">
            <img src="{% static 'images/swiftcart-logo.png' %}" alt="SwiftCart Logo">
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">

            <!-- Navigation -->
            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'product_list' %}">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'category' %}">Categories</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'gallery' %}">Gallery</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'about' %}">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contact' %}">Contact</a>
                </li>

            </ul>

            <!-- Right Side -->
            <div class="d-flex align-items-center navbar-right">

                <!-- Search -->
                <form class="search-box me-3">
                    <input type="text" placeholder="Search products...">
                    <button type="submit">
                        <i class="fas fa-search"></i>
                    </button>
                </form>

                <!-- Wishlist -->
                <a href="{% url 'wishlist' %}" class="nav-icon">

                    <i class="fa-regular fa-heart"></i>

                    <span class="count-badge" id="wishlist-count">
                        {{ wishlist_count }}
                    </span>

                </a>
                <!-- Cart -->
                <a href="{% url 'cart' %}" class="nav-icon">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <span class="count-badge" id="cart-count">
                        {{ cart_count }}
                    </span>

                </a>
                {% if user.is_authenticated %}

                <div class="dropdown">

                    <a class="login-btn dropdown-toggle text-decoration-none" href="#" role="button"
                        data-bs-toggle="dropdown" aria-expanded="false">

                        <i class="fas fa-user me-2"></i>
                        {{ user.first_name|default:"My Account" }}

                    </a>

                    <ul class="dropdown-menu dropdown-menu-end shadow">

                        <li>
                            <a class="dropdown-item" href="{% url 'profile' %}">
                                <i class="fas fa-user-circle me-2"></i>
                                My Profile
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="{% url 'my_orders' %}">
                                <i class="fas fa-box me-2"></i>
                                My Orders
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="{% url 'wishlist' %}">
                                <i class="fas fa-heart me-2 text-danger"></i>
                                My Wishlist
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" href="{% url 'cart' %}">
                                <i class="fas fa-shopping-cart me-2 text-primary"></i>
                                My Cart
                            </a>
                        </li>

                        <li>
                            <hr class="dropdown-divider">
                        </li>

                        <li>
                            <a class="dropdown-item text-danger" href="{% url 'logout' %}">
                                <i class="fas fa-sign-out-alt me-2"></i>
                                Logout
                            </a>
                        </li>

                    </ul>

                </div>

                {% else %}

                <a href="{% url 'login' %}" class="login-btn">
                    <i class="fas fa-sign-in-alt me-2"></i>
                    Login
                </a>

                {% endif %}
            </div>

        </div>

    </div>
</nav>
