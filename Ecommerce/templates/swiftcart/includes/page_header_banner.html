{% load static %}
<div class="page-header-banner py-5 text-center text-white"
    style="background: linear-gradient(135deg, rgba(13,61,176,0.9), rgba(47,109,255,0.85)), url({% static 'images/banners/header_banner.png' %}) center / cover no-repeat;">
    <div class="container py-5">
        <h1 class="display-5 fw-bold">{{ page_title|default:'Welcome' }}</h1>
        {% if page_subtitle %}
        <p class="lead text-white-75 mt-3">{{ page_subtitle }}</p>
        {% endif %}
    </div>
</div>
<style>
    .page-header-banner {
        min-height: 320px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    .page-header-banner::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(13, 61, 176, 0.55);
    }

    .page-header-banner .container {
        position: relative;
        z-index: 1;
    }

    .page-header-banner h1,
    .page-header-banner p {
        color: #ffffff;
        text-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }
</style>
