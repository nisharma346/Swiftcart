{% load static %}
<div class="page-header-banner text-center text-white">
    <div class="banner-bg"></div>
    <div class="container py-5">
        {% if page_heading and page_title and page_heading != page_title %}
        <div
            style="letter-spacing:6px; font-size:12px; text-transform:uppercase; opacity:0.9; font-weight:700; margin-bottom:12px;">
            {{ page_title|upper }}</div>
        {% endif %}
        <h1 class="banner-title">{{ page_heading|default:page_title|default:'Our Collection' }}</h1>
        {% if page_subtitle %}
        <p class="banner-subtitle mt-3">{{ page_subtitle }}</p>
        {% endif %}
    </div>
</div>
<style>
    .page-header-banner {
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 45px 0 70px 0;
        width: 100%;
        max-width: 1180px;
        margin: 0 auto 40px;
        border-radius: 32px;
        min-height: 320px;
    }

    .page-header-banner .banner-bg {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #1b0c45 0%, #3a1f85 45%, #b22f78 85%, #ff742f 100%);
        background-size: cover;
        background-position: center;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06), 0 20px 45px rgba(10, 13, 34, 0.18);
        z-index: 0;
    }

    .page-header-banner .banner-bg::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.14), transparent 28%);
        opacity: 0.4;
    }

    .page-header-banner .container {
        position: relative;
        z-index: 2;
        max-width: 980px;
        text-align: center;
    }

    .banner-title {
        font-size: 52px;
        font-weight: 900;
        margin: 12px 0 0;
        color: #ffffff;
        letter-spacing: -0.04em;
        text-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
    }

    .banner-subtitle {
        color: rgba(255, 255, 255, 0.92);
        font-size: 19px;
        max-width: 820px;
        margin: 0 auto;
        line-height: 1.8;
        opacity: 0.95;
    }

    @media (max-width:768px) {
        .banner-title {
            font-size: 28px
        }

        .page-header-banner {
            padding: 28px 0 40px
        }
    }
</style>
